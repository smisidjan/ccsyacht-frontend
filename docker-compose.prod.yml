services:
  frontend:
    image: ccsyacht-frontend:latest
    container_name: ccsyacht-frontend
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
      - BACKEND_URL=http://172.18.0.1:80
      - NEXT_PUBLIC_REVERB_APP_KEY=${NEXT_PUBLIC_REVERB_APP_KEY}
      - NEXT_PUBLIC_REVERB_HOST=${NEXT_PUBLIC_REVERB_HOST}
      - NEXT_PUBLIC_REVERB_PORT=${NEXT_PUBLIC_REVERB_PORT}
      - NEXT_PUBLIC_REVERB_SCHEME=${NEXT_PUBLIC_REVERB_SCHEME}
    ports:
      - "3000:3000"
    networks:
      - ccsyacht_ccsyacht
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ccsyacht_ccsyacht:
    external: true