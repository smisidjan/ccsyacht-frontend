services:
  nginx:
    image: nginx:alpine
    ports:
      - "3002:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - ccsyacht-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_API_URL=/api
    networks:
      - ccsyacht-network
    restart: unless-stopped

  # Production service (use with: docker compose --profile prod up)
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
    networks:
      - ccsyacht-network
    restart: unless-stopped
    profiles:
      - prod

networks:
  ccsyacht-network:
    external: true
